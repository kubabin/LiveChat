<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Suggest a Mod — Assembly Line SMP</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght,ROND@6..144,100..700,100&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />

<link rel="stylesheet" href="./base.css" />
<link rel="stylesheet" href="./suggest.css" />
</head>
<body>

<div class="suggest-app">

  <header class="suggest-header">
    <div class="suggest-header__titles">
      <h1 class="page-title">Suggest a Mod</h1>
      <p class="suggest-header__subtitle">Search Modrinth, suggest a mod, and vote on what gets added.</p>
    </div>

    <div class="suggest-header__actions">
      <button class="icon-button" id="theme-toggle" type="button" aria-label="Toggle dark mode">
        <span class="material-symbols-rounded" id="theme-icon">dark_mode</span>
      </button>
      <div id="auth-area"></div>
    </div>
  </header>

  <section class="suggest-search">
    <div class="search-box">
      <span class="material-symbols-rounded">search</span>
      <input type="text" id="search-input" placeholder="Search Modrinth mods…" autocomplete="off" />
    </div>
    <div id="search-results" class="search-results" style="display:none;"></div>
  </section>

  <section class="suggest-list-section">
    <div class="suggest-list-section__head">
      <h2 class="suggest-list-section__title">Suggestions</h2>
      <div class="suggest-list-section__filters" id="sort-filters">
        <button class="chip chip--active" data-sort="top">Top</button>
        <button class="chip" data-sort="new">New</button>
        <button class="chip" data-sort="added">Added</button>
      </div>
    </div>
    <div id="suggestions-list" class="suggestions-list">
      <p class="suggest-empty">Loading suggestions…</p>
    </div>
  </section>

</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="./suggest.js"></script>
</body>
</html>
