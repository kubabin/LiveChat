<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiveChat</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght,ROND@6..144,100..700,100&display=swap" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />
    
    <style>
        /* ---------- Material 3 design tokens (from Figma) ---------- */
        :root {
            /* Single control: change this hue (0-360) to shift the accent color everywhere. */
            --accent-hue: 261;
            
            --md-sys-color-surface: #FEF7FF;
            --md-sys-color-surface-container-lowest: #FFFFFF;
            --md-sys-color-surface-container-high: #ECE6F0;
            --md-sys-color-outline-variant: #CAC4D0;
            --md-sys-color-on-surface: #1D1B20;
            --md-sys-color-on-surface-variant: #49454F;
            --md-sys-color-secondary: hsl(var(--accent-hue), 15%, 40%);
            --md-sys-color-secondary-container: hsl(var(--accent-hue), 47%, 91%);
            --md-sys-color-on-secondary-container: hsl(var(--accent-hue), 15%, 27%);
            --md-sys-color-primary: hsl(var(--accent-hue), 39%, 45%);
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-surface-container: #F4EFF8;
            --md-sys-color-surface-container-highest: #E7E0EC;
            --md-sys-color-shadow: rgba(0, 0, 0, 0.15);
            
            --md-corner-extra-large: 28px;
            
            --font-display: "Google Sans Flex", "Segoe UI Variable", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            --font-body: "Google Sans Flex", "Segoe UI Variable", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            color-scheme: light;
        }
        
        :root[data-theme="dark"] {
            --md-sys-color-surface: #121212;
            --md-sys-color-surface-container-lowest: #1E1E1E;
            --md-sys-color-surface-container-high: #2B2B2B;
            --md-sys-color-outline-variant: #444444;
            --md-sys-color-on-surface: #F2F2F2;
            --md-sys-color-on-surface-variant: #D4D4D4;
            --md-sys-color-secondary: hsl(var(--accent-hue), 22%, 78%);
            --md-sys-color-secondary-container: hsl(var(--accent-hue), 15%, 25%);
            --md-sys-color-on-secondary-container: hsl(var(--accent-hue), 47%, 91%);
            --md-sys-color-primary: hsl(var(--accent-hue), 100%, 84%);
            --md-sys-color-on-primary: hsl(var(--accent-hue), 30%, 16%);
            --md-sys-color-surface-container: #1A1A1A;
            --md-sys-color-surface-container-highest: #2E2E2E;
            --md-sys-color-shadow: rgba(0, 0, 0, 0.35);
            color-scheme: dark;
        }
        
        * { box-sizing: border-box; }
        
        html, body {
            height: 100%;
            margin: 0;
            background: var(--md-sys-color-surface);
            font-family: var(--font-body);
            color: var(--md-sys-color-on-surface);
            transition: background 0.2s ease, color 0.2s ease;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }
        
        .material-symbols-rounded {
            font-family: "Material Symbols Rounded";
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 24px;
            line-height: 1;
            user-select: none;
        }
        
        .material-symbols-outlined {
            font-family: "Material Symbols Outlined";
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 24px;
            line-height: 1;
            user-select: none;
        }
        
        /* ---------- Layout ---------- */
        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            position: relative;
            isolation: isolate;
        }
        
        .icon-button {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            background: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 1px 3px var(--md-sys-color-shadow);
        }
        
        .content__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
        }

        
        /* ---------- Main content ---------- */
        .content {
            flex: 1;
            padding: 16px 16px 17px 0;
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
            position: relative;
            z-index: 1;
        }
        
        .page-title {
            font-family: var(--font-display) !important;
            font-weight: 600 !important;
            font-variation-settings: "opsz" 40, "ROND" 100;
            font-size: 34px;
            line-height: 44px;
            letter-spacing: -0.25px;
            color: var(--md-sys-color-on-surface);
            margin: 0 0 0 10px;
        }
        
        @media (min-width: 900px) {
            .page-title {
                font-size: 45px;
                line-height: 52px;
            }
        }

        
        /* ---------- Responsive: collapse rail labels on small screens ---------- */
        @media (max-width: 768px) {
            .app {
                flex-direction: column;
            }

            
            .content {
                padding: 12px 12px 16px;
            }
            
            .content__header {
                margin-bottom: 12px;
            }
            
            .page-title {
                font-size: 24px;
                line-height: 30px;
                margin-left: 0;
            }
        }
        
        @media (max-width: 480px) {
            .content { padding: 10px 10px 12px; }
            .page-title { font-size: 20px; line-height: 26px; }
            .icon-button { width: 40px; height: 40px; }
        }
        
        /* When a nav-item is selected, turn its icon FILL on */
        .nav-item[data-selected="true"] .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
    </style>
    <style>
        /* ---------- Conversation panel ---------- */
        .conversation {
            flex: 1;
            background: var(--md-sys-color-surface-container-lowest);
            border-radius: var(--md-corner-extra-large);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
            width: 100%;
            position: relative;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px 8px;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }
        
        .scroll-down-button {
            position: absolute;
            right: 16px;
            bottom: 16px;
            min-height: 48px;
            padding: 0 14px;
            border: none;
            border-radius: 999px;
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--md-sys-color-shadow);
            opacity: 0;
            transform: translateY(8px);
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 3;
        }
        
        .scroll-down-button__label {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }
        
        @media (max-width: 768px) {
            .scroll-down-button__label {
                display: none;
            }
        }
        
        .scroll-down-button--visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        
        .message {
            padding-block: 8px;
        }
        
        .message__author {
            font-family: var(--font-display);
            font-weight: 400;
            font-variation-settings: "opsz" 16, "ROND" 100;
            font-size: 16px;
            line-height: 24px;
            letter-spacing: 0.5px;
            color: var(--md-sys-color-on-surface);
            margin: 0 0 2px 61px;
        }
        
        .message__row {
            display: flex;
            align-items: flex-start;
            gap: 9px;
        }
        
        .message__avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            flex-shrink: 0;
            object-fit: cover;
            display: block;
            background-color: var(--md-sys-color-secondary-container);
        }
        
        .message__bubble {
            background: var(--md-sys-color-surface-container-high);
            color: var(--md-sys-color-on-surface-variant);
            max-width: 336px;
            min-height: 44px;
            padding: 8px 16px;
            border-radius: 20px 20px 20px 8px;
            font-family: var(--font-display);
            font-weight: 400;
            font-variation-settings: "opsz" 16, "ROND" 100;
            font-size: 16px;
            line-height: 24px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            word-break: break-word;
        }
        
        /* ---------- Composer ---------- */
        .composer {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-top: 1px solid var(--md-sys-color-outline-variant);
        }
        
        .composer__input {
            flex: 1;
            height: 48px;
            border-radius: 24px;
            border: 1px solid var(--md-sys-color-outline-variant);
            padding: 0 20px;
            font-family: var(--font-body);
            font-size: 16px;
            color: var(--md-sys-color-on-surface);
            background: var(--md-sys-color-surface);
            outline: none;
        }
        .composer__input:focus {
            border-color: var(--md-sys-color-primary);
            border-width: 2px;
            padding: 0 19px;
        }
        
        .composer__send {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: box-shadow 0.2s ease;
        }
        .composer__send:hover {
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .composer__send:disabled {
            opacity: 0.4;
            cursor: default;
            box-shadow: none;
        }
        
        /* ---------- Responsive ---------- */
        @media (max-width: 768px) {
            .conversation {
                border-radius: 20px;
            }
            
            .messages {
                padding: 12px 12px 8px;
            }
            
            .scroll-down-button {
                right: 12px;
                bottom: 12px;
                width: 44px;
                height: 44px;
            }
            
            .message__author {
                margin-left: 50px;
            }
            
            .message__bubble {
                max-width: min(100%, 280px);
            }
        }
        
    </style>
</head>
<body>
    
    <div class="app">
        <!-- Main content -->
        <main class="content">
            <div class="content__header">
                <h1 class="page-title">LiveChat</h1>
                <button class="icon-button" id="theme-toggle" type="button" aria-label="Toggle dark mode">
                    <span class="material-symbols-rounded" id="theme-icon">dark_mode</span>
                </button>
            </div>
            <section class="conversation" aria-label="Conversation" >
                <div class="messages" id="messages" style="max-height: fit-content">
                    <!-- messages injected by tabs/chat.js -->
                </div>
                <button class="scroll-down-button" id="scroll-down-button" type="button" aria-label="Scroll to bottom">
                    <span class="material-symbols-rounded">keyboard_double_arrow_down</span>
                    <span class="scroll-down-button__label">Scroll down</span>
                </button>
            </section>
        </main>
    </div>
    <script>
        // ---------- Main orchestrator ----------
        const themeToggle = document.getElementById("theme-toggle");
        const themeIcon = document.getElementById("theme-icon")

        
        /* ---------- Theme ---------- */
        function applyTheme(theme) {
            document.documentElement.setAttribute("data-theme", theme);
            const isDark = theme === "dark";
            themeIcon.textContent = isDark ? "light_mode" : "dark_mode";
            themeToggle.setAttribute("aria-label", isDark ? "Switch to light mode" : "Switch to dark mode");
            localStorage.setItem("theme", theme);
        }
        
        function initializeTheme() {
            const savedTheme = localStorage.getItem("theme");
            const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            const initialTheme = savedTheme || (prefersDark ? "dark" : "light");
            applyTheme(initialTheme);
        }
        
        themeToggle.addEventListener("click", () => {
            const nextTheme = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
            applyTheme(nextTheme);
        });
        
        /* ---------- Boot ---------- */
        initializeTheme();
        
    </script>
    <script>
        // ---------- Chat tab ----------
        window.TAB_MODULES = window.TAB_MODULES || {};
        
        (function () {
            const chatApiUrl = "/api/chat";
            
            let messagesEl = null;
            let scrollDownButton = null;
            let started = false;
            
            function getPlayerHeadUrl(username) {
                const safeName = encodeURIComponent(username.trim());
                return `https://mc-heads.net/avatar/${safeName}/64.png`;
            }
            
            function renderMessage({ author, text }) {
                const wrap = document.createElement("div");
                wrap.className = "message";
                
                const authorEl = document.createElement("p");
                authorEl.className = "message__author";
                authorEl.textContent = author;
                
                const row = document.createElement("div");
                row.className = "message__row";
                
                const avatar = document.createElement("img");
                avatar.className = "message__avatar";
                avatar.src = getPlayerHeadUrl(author);
                avatar.alt = `${author} head`;
                
                const bubble = document.createElement("div");
                bubble.className = "message__bubble";
                bubble.textContent = text;
                
                row.append(avatar, bubble);
                wrap.append(authorEl, row);
                messagesEl.appendChild(wrap);
            }
            
            function clearMessages() {
                messagesEl.innerHTML = "";
            }
            
            function shouldAutoScroll() {
                const threshold = 80;
                return messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight <= threshold;
            }
            
            function scrollToBottom() {
                messagesEl.scrollTop = messagesEl.scrollHeight;
                updateScrollButton();
            }
            
            function updateScrollButton() {
                if (!messagesEl || !scrollDownButton) return;
                const canScroll = messagesEl.scrollHeight > messagesEl.clientHeight + 1;
                const isNearBottom = shouldAutoScroll();
                scrollDownButton.classList.toggle("scroll-down-button--visible", canScroll && !isNearBottom);
            }
            
            function renderMessages(messages) {
                const wasNearBottom = shouldAutoScroll();
                clearMessages();
                messages.forEach(renderMessage);
                if (wasNearBottom) {
                    scrollToBottom();
                }
            }
            
            function normalizeMessage(entry) {
                if (!entry || typeof entry !== "object") return null;
                
                const candidateText =
                entry.text ||
                entry.message ||
                entry.content ||
                entry.body ||
                entry.value ||
                "";
                const candidateAuthor =
                entry.player ||
                entry.author ||
                entry.username ||
                entry.user ||
                entry.name ||
                entry.sender ||
                "Unknown";
                
                const text = String(candidateText).trim();
                if (!text) return null;
                
                return {
                    author: String(candidateAuthor),
                    text,
                };
            }
            
            function normalizeMessages(payload) {
                if (Array.isArray(payload)) {
                    return payload.map(normalizeMessage).filter(Boolean);
                }
                
                if (payload && typeof payload === "object") {
                    const candidateArrays = [
                    payload.messages,
                    payload.chat,
                    payload.data,
                    payload.results,
                    payload.items,
                    payload.history,
                    ].filter(Array.isArray);
                    
                    if (candidateArrays.length > 0) {
                        return candidateArrays[0].map(normalizeMessage).filter(Boolean);
                    }
                    
                    const nested = normalizeMessage(payload);
                    if (nested) return [nested];
                }
                
                return [];
            }
            
            async function loadLatestChat() {
                try {
                    const response = await fetch(chatApiUrl);
                    if (!response.ok) {
                        throw new Error(`Request failed with status ${response.status}`);
                    }
                    
                    const data = await response.json();
                    const messages = normalizeMessages(data).slice(-90); // Limit to the last 90 messages
                    if (messages.length > 0) {
                        renderMessages(messages);
                        return;
                    }
                } catch (error) {
                    console.warn("Unable to load live chat messages:", error);
                }
                
                if (shouldAutoScroll()) {
                    clearMessages();
                    scrollToBottom();
                } else {
                    clearMessages();
                }
            }
            
            function startChatPolling() {
                if (started) return;
                started = true;
                setInterval(() => {
                    loadLatestChat();
                }, 2000);
            }
            messagesEl = document.querySelector("#messages");
            scrollDownButton = document.querySelector("#scroll-down-button");
            
            scrollDownButton.addEventListener("click", () => {
                scrollToBottom();
            });
            
            messagesEl.addEventListener("scroll", () => updateScrollButton());
            window.addEventListener("resize", updateScrollButton);
            
            loadLatestChat();
            updateScrollButton();
            startChatPolling();
            
            window.requestAnimationFrame(() => {
                scrollToBottom();
                updateScrollButton();
            });
            
        })();
        
    </script>
</body>
</html>
